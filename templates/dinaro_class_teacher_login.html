{% extends "base.html" %}
{% block title %}Teacher Login{% endblock %}

{% block content %}
<div class="page">
  <header class="page-header">
    <h1>Teacher login</h1>
    <p class="muted">Enter your class code and teacher PIN.</p>
  </header>

  <section class="panel">
    {% if error %}
      <div class="callout">{{ error }}</div>
    {% endif %}
    <form method="post" class="stack">
      <div class="field">
        <label for="classCode">Class code</label>
        <input id="classCode" type="text" name="class_code" placeholder="ABC123" required>
      </div>

      <div class="field">
        <label for="teacherPin">Teacher PIN</label>
        <input id="teacherPin" type="password" name="teacher_pin" inputmode="numeric" required>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Enter</button>
        <a class="btn" href="{{ url_for('dinaro_landing') }}">Back</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
