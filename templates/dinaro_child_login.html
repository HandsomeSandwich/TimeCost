{% extends "base.html" %}
{% block title %}Child Login{% endblock %}

{% block content %}
<div class="page">
  <header class="page-header">
    <h1>Child login</h1>
    <p class="muted">Pick your name and enter your PIN.</p>
  </header>

  <section class="panel">
    {% if error %}
      <div class="callout">{{ error }}</div>
    {% endif %}
    <form method="post" class="stack">
      <div class="field">
        <label for="childSelect">Child</label>
        <select id="childSelect" name="child_id" required>
          <option value="">Choose a child</option>
          {% for kid in kids %}
            <option value="{{ kid.id }}">{{ kid.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="childPin">PIN</label>
        <input id="childPin" type="password" name="child_pin" inputmode="numeric" required>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Enter</button>
        <a class="btn" href="{{ url_for('dinaro_landing') }}">Back</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
